{% extends "base.html" %}

{% block start %}
<div class="mt-20">
    <h1 class="text-2xl font-semibold mb-4">Profile</h1>

    <!-- Display Profile Picture -->
    <div class="mb-4">
        {% if profile_image_url %}
            <img src="{{ profile_image_url }}" alt="Profile Picture" class="rounded-full h-24 w-24">
        {% else %}
        <svg class="w-8 h-8 text-gray-500 dark:text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 0a10 10 0 1 0 10 10A10.011 10.011 0 0 0 10 0Zm0 5a3 3 0 1 1 0 6 3 3 0 0 1 0-6Zm0 13a8.949 8.949 0 0 1-4.951-1.488A3.987 3.987 0 0 1 9 13h2a3.987 3.987 0 0 1 3.951 3.512A8.949 8.949 0 0 1 10 18Z"/>
        </svg>
          
          
        {% endif %}
    </div>

    <!-- Upload New Profile Picture -->
    <div class="flex items-center gap-x-3">
        <img src="../static/images/milton1.jpg" class="h-8 w-8 rounded-full" alt="FeedSync Logo" />
        <form method="POST" enctype="multipart/form-data" class="flex flex-col gap-y-2">
            {% csrf_token %}
            <input type="file" name="profilepic" id="profilepic" class="border border-gray-300 rounded-md p-1">
            <button type="submit" class="bg-green-500 px-6 py-1.5 font-bold text-white rounded-lg hover:bg-green-600">Update Profile Picture</button>
        </form>
    </div>
{% endblock %}
