{% extends "base.html" %}

{% block start %}

<style>
    .message-container {
        display: flex;
        flex-direction: column;
        margin: 10px 0; /* Add some space between messages */
    }

    .message {
        padding: 10px 15px; /* Padding for better readability */
        border-radius: 8px; /* Round edges */
        max-width: 70%; /* Limit message width */
        word-wrap: break-word; /* Wrap long words */
        margin-bottom: 5px; /* Space between messages */
        display: flex; /* Align items horizontally */
        align-items: center; /* Center items vertically */
    }

    .message.left {
        background-color: #f1f1f1;
        align-self: flex-start; /* Align left */
        text-align: left;
    }

    .message.right {
        background-color: #cfe9ff;
        align-self: flex-end; /* Align right */
        text-align: right;
    }

    .clear {
        clear: both;
    }

    .friend {
        transition: background-color 0.3s ease; /* Smooth background change */
    }

    .friend:hover {
        background-color: #e2e8f0; /* Lighter gray on hover */
    }

    .friend-image {
        width: 24px; /* Adjust size as needed */
        height: 24px; /* Adjust size as needed */
        border-radius: 50%;
        margin-right: 8px; /* Space between image and text */
    }
</style>

<div class="mt-20 m-2 bg-white md:mx-32">
    <h1 class="p-5 font-bold text-gray-600 text-2xl">Chats</h1>

    <div class="flex flex-col justify-center items-center">
        <form class="w-1/2 bg-gray-100 rounded-full flex items-center shadow-sm my-1">
            <input type="search" name="search" placeholder="Search friends"
                class="flex-grow text-gray-700 bg-gray-100 rounded-l-full border-none focus:outline-none px-4">
            <button type="submit"
                class="px-3 py-3 bg-gray-100 rounded-r-full hover:bg-zinc-200 focus:outline-none focus-within:bg-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-600" fill="currentColor" viewBox="0 0 50 50">
                    <path
                        d="M 21 3 C 11.621094 3 4 10.621094 4 20 C 4 29.378906 11.621094 37 21 37 C 24.710938 37 28.140625 35.804688 30.9375 33.78125 L 44.09375 46.90625 L 46.90625 44.09375 L 33.90625 31.0625 C 36.460938 28.085938 38 24.222656 38 20 C 38 10.621094 30.378906 3 21 3 Z M 21 5 C 29.296875 5 36 11.703125 36 20 C 36 28.296875 29.296875 35 21 35 C 12.703125 35 6 28.296875 6 20 C 6 11.703125 12.703125 5 21 5 Z">
                    </path>
                </svg>
            </button>
        </form>
    </div>

    <hr class="mt-4 border-t border-2 border-gray-300">

    {% if my_friends %}
    {% for m in my_friends %}
    <div class="friend w-full flex items-center hover:bg-gray-300 p-2 cursor-pointer" data-name="{{ m.name }}" data-image="{{ m.image }}">
        <img src="{{ m.image }}" alt="{{ m.name }}" data-image="{{m.image}}" class="rounded-full border h-12 w-12 mb-1 object-cover">
        <h1 class="ml-4 font-bold">{{ m.name }}</h1>
    </div>

    <!-- Chat Container -->
    <div id="chat-container" class="hidden fixed top-16 right-4 sm:w-1/4 md:w-1/2 z-10">
        <div class="bg-white shadow-md rounded-lg max-w-lg w-full">
            <div class="p-4 border-b bg-slate-400 text-white rounded-t-lg flex justify-between items-center">
                <div class="flex items-center gap-x-2">
                  <img id="friend-image" src="" alt="" class="rounded-full border h-12 w-12 mb-1 object-cover">
                    <h3 id="textfriend" class="text-lg font-semibold"></h3>
                </div>
                <button id="close-chat" class="text-gray-300 hover:text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div id="chatbox" class="p-4 h-80 overflow-y-auto">
                <!-- Chat messages will be displayed here -->
            </div>

            <div class="p-4 border-t flex">
                <textarea  class="user-input w-full px-3 py-2 border rounded-l-md focus:outline-none"></textarea>
                <button class="send-button bg-blue-500 text-white px-4 py-2 rounded-r-md hover:bg-blue-600">Send</button>
            </div>
        </div>
    </div>
    {% endfor %}
    {% endif %}

    <script>
        const chatContainer = document.getElementById("chat-container");
        const openChatButtons = document.querySelectorAll(".friend");
        const closeChatButton = document.getElementById("close-chat");
        const otherUsernameDisplay = document.getElementById("textfriend");
        const username = "{{ request.user.username }}"; 
        const userInput = document.querySelector(".user-input");
        const sendButton = document.querySelector(".send-button");
        const friendImageElement = document.getElementById("friend-image");

        let socket = null;  // check if socket exists

        function openChat(friendName, friendImage) {
            otherUsernameDisplay.textContent = friendName;
            friendImageElement.src = friendImage;

            // closing the socket if exists 
            if (socket) {
                socket.close();
            }

            // Opening a new WebSocket connection
            socket = new WebSocket(`ws://${window.location.host}/ws/messenger/${username}/${friendName}/`);

            socket.onopen = function() {
                console.log(`Connected to chat with ${friendName}`);
            }

            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                console.log("Data", data);

                // Check the type of the received data
                if (data.type === 'conversation') {
                    const conversation = data.conversation;
                    const chatbox = document.getElementById('chatbox');
                    chatbox.innerHTML = ""; 

                    conversation.forEach(msg => {
                        const imgTag = msg.sender !== username ? `<img src="${friendImage}" alt="${msg.sender}" class="rounded-full border h-10 gap-x-2 w-10 mb-1 object-cover">` : '';
                        const messageClass = msg.sender === username ? 'right' : 'left';
                        chatbox.innerHTML += `
                            <div class="message-container">
                                <div class="message gap-x-2 font-medium ${messageClass}">
                                    ${imgTag} <!-- Display friend's image -->
                                    ${msg.content}
                                </div>
                            </div>
                            <div class="clear"></div>`;
                    });

                    chatbox.scrollTop = chatbox.scrollHeight;
                } else if (data.message) {
                    // This handles new messages
                    const message = data.message;
                    const sender = data.username;
                    const chatbox = document.getElementById('chatbox');
                    const messageClass = sender === username ? 'right' : 'left';

                    const imgTag = sender !== username ? `<img src="${friendImage}" alt="${sender}" class="friend-image">` : '';

                    chatbox.innerHTML += `
                        <div class="message-container">
                            <div class="message ${messageClass}">
                                ${imgTag}
                                ${message}
                            </div>
                        </div>
                        <div class="clear"></div>`;

                    chatbox.scrollTop = chatbox.scrollHeight;
                }
            }

            socket.onerror = function(error) {
                console.error('WebSocket Error:', error);
            }

            // if sockets get connected show the chat container
            chatContainer.classList.remove("hidden");
        }

        openChatButtons.forEach(button => {
            button.addEventListener('click', function () {
                const friendName = button.getAttribute("data-name");
                const friendImage = button.getAttribute("data-image"); // Get the friend's image URL
                openChat(friendName, friendImage); // Pass it to the openChat function
            });
        });

        sendButton.addEventListener('click', function () {
            const message = userInput.value.trim();
            if (message && socket) {
                socket.send(JSON.stringify({
                    message: message,
                    username: username,
                    other_username: otherUsernameDisplay.textContent,
                }));
                userInput.value = '';  
            }
        });

        closeChatButton.addEventListener('click', function () {
            if (socket) {
                socket.close();
                socket = null;
            }
            chatContainer.classList.add("hidden");
        });
    </script>
</div>

{% endblock %}
